[system]
compatible=@RAUC_COMPATIBLE@
bootloader=@BOOTLOADER@
data-directory=/data/rauc
# GRUB-EFI reads grubenv from the ESP (where grub.cfg lives, mounted at
# /boot/efi). Without this RAUC would update the rootfs copy of grubenv
# while GRUB keeps reading the ESP copy — slot order changes never take
# effect at boot. Ignored on non-grub bootloaders.
grubenv=/boot/efi/boot/grub/grubenv

[keyring]
path=/etc/rauc/keyring.pem

[handlers]
post-install=/usr/lib/rauc/post-install.sh

[slot.rootfs.0]
device=/dev/disk/by-partlabel/rootfs-a
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/disk/by-partlabel/rootfs-b
type=ext4
bootname=B
