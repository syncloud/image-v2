# GRUB config with RAUC A/B boot + retry/rollback support.
# RAUC manages grubenv variables: ORDER, A_OK, B_OK, A_TRY, B_TRY.

# Route GRUB output to the serial console too so its echoes land in the
# test harness' QEMU console log.
serial --unit=0 --speed=115200
terminal_input console serial
terminal_output console serial

# Read grubenv from the ESP explicitly. Without --file, load_env resolves
# relative to $prefix which with 'grub-install --removable' lives on the
# rootfs, never sees RAUC's writes to the ESP copy.
load_env --file=(hd0,gpt1)/boot/grub/grubenv

echo "RAUC-DEBUG loaded: ORDER='${ORDER}' A_OK='${A_OK}' B_OK='${B_OK}' A_TRY='${A_TRY}' B_TRY='${B_TRY}'"

# Default to slot A. All branches that want B must explicitly set
# default=1 — and the default stays at 0 if nothing matches, which is
# the correct rollback target when B is the preferred-but-broken slot.
set default=0
set timeout=3

if [ "${ORDER}" = "B A" ] ; then
    echo "RAUC-DEBUG branch: ORDER=B A (prefer B)"
    if [ "${B_OK}" = "1" ] ; then
        echo "RAUC-DEBUG: B_OK=1, pick B"
        set default=1
    fi
    if [ "${B_OK}" != "1" ] ; then
        if [ "${B_TRY}" -gt 0 ] ; then
            echo "RAUC-DEBUG: B_TRY>0, pick B and decrement"
            set default=1
            set B_TRY=$((B_TRY - 1))
            save_env --file=(hd0,gpt1)/boot/grub/grubenv B_TRY
        fi
    fi
fi

if [ "${ORDER}" != "B A" ] ; then
    echo "RAUC-DEBUG branch: ORDER!=B A (prefer A)"
    if [ "${A_OK}" = "1" ] ; then
        echo "RAUC-DEBUG: A_OK=1, pick A"
        set default=0
    fi
    if [ "${A_OK}" != "1" ] ; then
        if [ "${A_TRY}" -gt 0 ] ; then
            echo "RAUC-DEBUG: A_TRY>0, pick A and decrement"
            set default=0
            set A_TRY=$((A_TRY - 1))
            save_env --file=(hd0,gpt1)/boot/grub/grubenv A_TRY
        fi
        if [ "${A_TRY}" = "0" ] ; then
            if [ "${B_OK}" = "1" ] ; then
                echo "RAUC-DEBUG: A bad, B_OK=1, fall back to B"
                set default=1
            fi
            if [ "${B_OK}" != "1" ] ; then
                if [ "${B_TRY}" -gt 0 ] ; then
                    echo "RAUC-DEBUG: A bad, B_TRY>0, fall back to B + decrement"
                    set default=1
                    set B_TRY=$((B_TRY - 1))
                    save_env --file=(hd0,gpt1)/boot/grub/grubenv B_TRY
                fi
            fi
        fi
    fi
fi

echo "RAUC-DEBUG decided: default=${default}"

menuentry "Syncloud Slot A" {
    set root=(hd0,gpt2)
    linux /vmlinuz root=PARTLABEL=rootfs-a rootfstype=ext4 rauc.slot=A console=tty0 console=ttyS0,115200
    initrd /initrd.img
}

menuentry "Syncloud Slot B" {
    set root=(hd0,gpt3)
    linux /vmlinuz root=PARTLABEL=rootfs-b rootfstype=ext4 rauc.slot=B console=tty0 console=ttyS0,115200
    initrd /initrd.img
}
