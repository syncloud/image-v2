# GRUB config with RAUC A/B support for amd64-uefi
# RAUC manages grubenv variables: ORDER, A_OK, B_OK, A_TRY, B_TRY
# ORDER is a space-separated slot-name list, first = preferred.

load_env

set default=0
set timeout=3

# If ORDER starts with B and B is bootable (known-good or has try attempts
# left), pick slot 1. Otherwise default to slot A (slot 0).
if [ "${ORDER}" = "B A" ]; then
    if [ "${B_OK}" = "1" -o "${B_TRY}" = "1" -o "${B_TRY}" = "2" -o "${B_TRY}" = "3" ]; then
        set default=1
    fi
fi

menuentry "Syncloud Slot A" {
    search --no-floppy --label --set=root rootfs-a
    if [ -z "$root" ]; then
        echo "rootfs-a not found by label, trying (hd0,gpt2)"
        set root=(hd0,gpt2)
    fi
    linux /vmlinuz root=PARTLABEL=rootfs-a rootfstype=ext4 rauc.slot=A console=tty0 console=ttyS0,115200
    initrd /initrd.img
}

menuentry "Syncloud Slot B" {
    search --no-floppy --label --set=root rootfs-b
    if [ -z "$root" ]; then
        echo "rootfs-b not found by label, trying (hd0,gpt3)"
        set root=(hd0,gpt3)
    fi
    linux /vmlinuz root=PARTLABEL=rootfs-b rootfstype=ext4 rauc.slot=B console=tty0 console=ttyS0,115200
    initrd /initrd.img
}
