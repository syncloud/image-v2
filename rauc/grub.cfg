# GRUB config with RAUC A/B support for amd64-uefi
# RAUC manages grubenv variables: ORDER, A_OK, B_OK, A_TRY, B_TRY

load_env

set default=0
set timeout=3

# Determine which slot to boot
if [ "${ORDER}" = "BA" ]; then
    if [ "${B_TRY}" -gt 0 -o "${B_OK}" -eq 1 ]; then
        set default=1
    fi
fi

menuentry "Syncloud Slot A" {
    search --no-floppy --label --set=root rootfs-a
    linux /boot/vmlinuz root=PARTLABEL=rootfs-a rootfstype=ext4 rauc.slot=A console=tty0 console=ttyS0,115200
    initrd /boot/initrd.img
}

menuentry "Syncloud Slot B" {
    search --no-floppy --label --set=root rootfs-b
    linux /boot/vmlinuz root=PARTLABEL=rootfs-b rootfstype=ext4 rauc.slot=B console=tty0 console=ttyS0,115200
    initrd /boot/initrd.img
}
