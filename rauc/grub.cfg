# GRUB config with RAUC A/B boot + retry/rollback support.
# RAUC manages grubenv variables: ORDER, A_OK, B_OK, A_TRY, B_TRY.
# - ORDER is a space-separated slot-name list; first = preferred.
# - <slot>_OK=1 means the slot has been marked good after a successful
#   boot (done by syncloud-boot-ok.service).
# - <slot>_TRY is the remaining boot attempts before the slot is
#   considered bad. RAUC sets it to 3 on install; mark-good resets it.
#
# We decrement <slot>_TRY *before* booting, so a crash mid-boot still
# consumes a retry. When a slot has TRY=0 and OK=0, it is skipped and
# the next slot in ORDER is attempted (rollback).
#
# GPT layout is fixed at image build time:
#   gpt1=esp, gpt2=rootfs-a, gpt3=rootfs-b, gpt4=data

# Read/write grubenv on the ESP (hd0,gpt1) — the same path RAUC writes
# via system.conf (grubenv=/boot/efi/boot/grub/grubenv). Without --file
# GRUB resolves relative to $prefix, which with grub-install --removable
# ends up on the rootfs, and RAUC's updates to ORDER/<slot>_OK/TRY never
# take effect at boot.
# Route GRUB output to the serial console too so its echoes land in the
# test harness' QEMU console log (otherwise GRUB only draws to VGA).
serial --unit=0 --speed=115200
terminal_input console serial
terminal_output console serial

load_env --file=(hd0,gpt1)/boot/grub/grubenv

echo "RAUC-DEBUG loaded: ORDER='${ORDER}' A_OK='${A_OK}' B_OK='${B_OK}' A_TRY='${A_TRY}' B_TRY='${B_TRY}'"

set default=0
set timeout=3

if [ "${ORDER}" = "B A" ] ; then
    # B is the preferred slot.
    if [ "${B_OK}" = "1" ] ; then
        set default=1
    elif [ "${B_TRY}" -gt 0 ] ; then
        set default=1
        set B_TRY=$((B_TRY - 1))
        save_env --file=(hd0,gpt1)/boot/grub/grubenv B_TRY
    elif [ "${A_OK}" = "1" ] ; then
        set default=0
    elif [ "${A_TRY}" -gt 0 ] ; then
        set default=0
        set A_TRY=$((A_TRY - 1))
        save_env --file=(hd0,gpt1)/boot/grub/grubenv A_TRY
    fi
else
    # A is the preferred slot (ORDER="A B" or anything else / unset).
    if [ "${A_OK}" = "1" ] ; then
        set default=0
    elif [ "${A_TRY}" -gt 0 ] ; then
        set default=0
        set A_TRY=$((A_TRY - 1))
        save_env --file=(hd0,gpt1)/boot/grub/grubenv A_TRY
    elif [ "${B_OK}" = "1" ] ; then
        set default=1
    elif [ "${B_TRY}" -gt 0 ] ; then
        set default=1
        set B_TRY=$((B_TRY - 1))
        save_env --file=(hd0,gpt1)/boot/grub/grubenv B_TRY
    fi
fi

echo "RAUC-DEBUG decided: default=${default}"

menuentry "Syncloud Slot A" {
    set root=(hd0,gpt2)
    linux /vmlinuz root=PARTLABEL=rootfs-a rootfstype=ext4 rauc.slot=A console=tty0 console=ttyS0,115200
    initrd /initrd.img
}

menuentry "Syncloud Slot B" {
    set root=(hd0,gpt3)
    linux /vmlinuz root=PARTLABEL=rootfs-b rootfstype=ext4 rauc.slot=B console=tty0 console=ttyS0,115200
    initrd /initrd.img
}
