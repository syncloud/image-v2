# GRUB config with RAUC A/B boot + retry/rollback support.
# RAUC manages grubenv variables: ORDER, A_OK, B_OK, A_TRY, B_TRY.
# - ORDER is a space-separated slot-name list; first = preferred.
# - <slot>_OK=1 means the slot has been marked good after a successful
#   boot (done by syncloud-boot-ok.service).
# - <slot>_TRY is the remaining boot attempts before the slot is
#   considered bad. Set by rauc to 3 on install.
# We decrement TRY *before* booting so a crash after save_env still
# consumes a retry. When a slot has TRY=0 and OK=0, it is skipped and
# the next slot in ORDER is attempted (rollback).
#
# GPT layout is fixed at image build time:
#   gpt1=esp, gpt2=rootfs-a, gpt3=rootfs-b, gpt4=data

load_env

set default=0
set timeout=3

# Slot eligibility: known-good OR has retries left.
set A_eligible=0
if [ "${A_OK}" = "1" -o "${A_TRY}" -gt 0 ] ; then set A_eligible=1 ; fi
set B_eligible=0
if [ "${B_OK}" = "1" -o "${B_TRY}" -gt 0 ] ; then set B_eligible=1 ; fi

# Preference order from ORDER.
if [ "${ORDER}" = "B A" ] ; then
    set first=B
    set second=A
else
    set first=A
    set second=B
fi

# Pick target: first-preference if eligible, else second-preference.
set target=""
if [ "${first}" = "A" -a "${A_eligible}" = "1" ] ; then set target=A ; fi
if [ -z "${target}" -a "${first}" = "B" -a "${B_eligible}" = "1" ] ; then set target=B ; fi
if [ -z "${target}" -a "${second}" = "A" -a "${A_eligible}" = "1" ] ; then set target=A ; fi
if [ -z "${target}" -a "${second}" = "B" -a "${B_eligible}" = "1" ] ; then set target=B ; fi

# Decrement TRY for the chosen slot if it isn't known-good yet — writes
# new value to grubenv BEFORE booting, so a kernel panic mid-boot still
# counts as an attempt.
if [ "${target}" = "A" ] ; then
    set default=0
    if [ "${A_OK}" != "1" -a "${A_TRY}" -gt 0 ] ; then
        set A_TRY=$((A_TRY - 1))
        save_env A_TRY
    fi
fi
if [ "${target}" = "B" ] ; then
    set default=1
    if [ "${B_OK}" != "1" -a "${B_TRY}" -gt 0 ] ; then
        set B_TRY=$((B_TRY - 1))
        save_env B_TRY
    fi
fi

menuentry "Syncloud Slot A" {
    set root=(hd0,gpt2)
    linux /vmlinuz root=PARTLABEL=rootfs-a rootfstype=ext4 rauc.slot=A console=tty0 console=ttyS0,115200
    initrd /initrd.img
}

menuentry "Syncloud Slot B" {
    set root=(hd0,gpt3)
    linux /vmlinuz root=PARTLABEL=rootfs-b rootfstype=ext4 rauc.slot=B console=tty0 console=ttyS0,115200
    initrd /initrd.img
}
