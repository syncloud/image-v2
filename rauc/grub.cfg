# RAUC upstream A/B grub.cfg pattern.
# See https://rauc.readthedocs.io/en/latest/integration.html#grub
# and https://github.com/rauc/rauc/blob/master/data/grub.cfg.example

set default=A
set timeout=3

# Route GRUB output to the serial console too so echoes land in the
# test harness' QEMU console log.
serial --unit=0 --speed=115200
terminal_input console serial
terminal_output console serial

# Read grubenv from the ESP explicitly — with 'grub-install --removable',
# $prefix points to the rootfs copy, which RAUC never writes to.
load_env --file=(hd0,gpt1)/boot/grub/grubenv

echo "RAUC-DEBUG loaded: ORDER='${ORDER}' A_OK='${A_OK}' B_OK='${B_OK}' A_TRY='${A_TRY}' B_TRY='${B_TRY}'"

# Build an ordered list of eligible slots (known-good or retries left).
# GRUB's eval runs arguments as commands, so 'eval OK=$X' fails because
# bare-name assignment isn't a grub command. Inline the per-slot checks
# instead — we only have two slots, so it's fine.
set ordered_slots=""
for slot in ${ORDER} ; do
    set slot_ok=""
    set slot_try=""
    if [ "${slot}" = "A" ] ; then
        set slot_ok="${A_OK}"
        set slot_try="${A_TRY}"
    fi
    if [ "${slot}" = "B" ] ; then
        set slot_ok="${B_OK}"
        set slot_try="${B_TRY}"
    fi
    if [ "${slot_ok}" = "1" -o "${slot_try}" -gt 0 ] ; then
        set ordered_slots="${ordered_slots} ${slot}"
    fi
done

# Pick the first eligible slot.
set target=""
for slot in ${ordered_slots} ; do
    if [ -z "${target}" ] ; then
        set target="${slot}"
    fi
done

# Decrement TRY counter on the chosen slot if it's not known-good, so a
# crash mid-boot consumes a retry. Write to the ESP grubenv.
# GRUB 2.06 script has no arithmetic expansion ($((...)) is a syntax
# error), so decrement via explicit ladder. max-boot-attempts is 3
# upstream; we cover 3→2→1→0.
if [ "${target}" = "A" ] ; then
    echo "RAUC-DEBUG: A-branch A_OK=${A_OK} A_TRY=${A_TRY}"
    if [ "${A_OK}" != "1" ] ; then
        if [ "${A_TRY}" = "3" ] ; then set A_TRY="2"
        else if [ "${A_TRY}" = "2" ] ; then set A_TRY="1"
        else if [ "${A_TRY}" = "1" ] ; then set A_TRY="0"
        fi ; fi ; fi
        save_env --file=(hd0,gpt1)/boot/grub/grubenv A_TRY
        echo "RAUC-DEBUG: A-branch wrote A_TRY=${A_TRY}"
    fi
fi
if [ "${target}" = "B" ] ; then
    echo "RAUC-DEBUG: B-branch B_OK=${B_OK} B_TRY=${B_TRY}"
    if [ "${B_OK}" != "1" ] ; then
        if [ "${B_TRY}" = "3" ] ; then set B_TRY="2"
        else if [ "${B_TRY}" = "2" ] ; then set B_TRY="1"
        else if [ "${B_TRY}" = "1" ] ; then set B_TRY="0"
        fi ; fi ; fi
        save_env --file=(hd0,gpt1)/boot/grub/grubenv B_TRY
        echo "RAUC-DEBUG: B-branch wrote B_TRY=${B_TRY}"
    fi
fi

set default=${target}

echo "RAUC-DEBUG decided: target='${target}' default='${default}'"

menuentry "Syncloud Slot A" --id=A {
    set root=(hd0,gpt2)
    linux /vmlinuz root=PARTLABEL=rootfs-a rootfstype=ext4 rauc.slot=A console=tty0 console=ttyS0,115200 panic=10
    initrd /initrd.img
}

menuentry "Syncloud Slot B" --id=B {
    set root=(hd0,gpt3)
    linux /vmlinuz root=PARTLABEL=rootfs-b rootfstype=ext4 rauc.slot=B console=tty0 console=ttyS0,115200 panic=10
    initrd /initrd.img
}
