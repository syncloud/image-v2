BOARD=rpi4b
ARCH=arm64
BOOTLOADER=u-boot
RAUC_COMPATIBLE="syncloud-raspberrypi-64"
ARMBIAN_IMAGE_URL="https://dl.armbian.com/rpi4b/Noble_current_minimal"
# Armbian ships RPi as direct-kernel-boot (Pi firmware loads vmlinuz from vfat).
# We pivot to U-Boot so our boot.scr A/B selector runs — Pi firmware loads
# u-boot.bin from vfat, which then reads kernel from the slot rootfs /boot.
NEEDS_UBOOT_PIVOT=yes
UBOOT_RPI_BIN=/usr/lib/u-boot/rpi_arm64/u-boot.bin
